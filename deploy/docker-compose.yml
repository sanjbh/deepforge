services:
  tempo:
    image: grafana/tempo:2.4.1
    container_name: deepforge-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml
    ports:
      - "4318:4318"   # OTLP HTTP receiver ŌĆö deepforge sends traces here
      - "3200:3200"   # Tempo API ŌĆö queried by Grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: deepforge-mailhog
    ports:
      - "1025:1025"   # SMTP ŌĆö your app sends emails here
      - "8025:8025"   # Web UI ŌĆö view captured emails in browser
    restart: unless-stopped
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: deepforge-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      tempo:
        condition: service_healthy

  deepforge:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: deepforge-app
    environment:
      # LLM
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      # Search
      - HOW_MANY_SEARCHES=${HOW_MANY_SEARCHES}
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL}
      - RESULTS_PER_SEARCH=${RESULTS_PER_SEARCH}
      # Email
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - TO_EMAIL=${TO_EMAIL}
      - MAILHOG_HOST=${MAILHOG_HOST}      # ŌåÉ missing
      - MAILHOG_PORT=${MAILHOG_PORT}      # ŌåÉ missing
      # Observability
      - SERVICE_NAME=${SERVICE_NAME}
      - SERVICE_VERSION=${SERVICE_VERSION}
      - LOG_LEVEL=${LOG_LEVEL}
      - OTLP_ENDPOINT=tempo:4318   # ŌåÉ service name, not localhost
      # Query
      # - DEEPFORGE_QUERY=${DEEPFORGE_QUERY}
      - DEEPFORGE_QUERY=Learn async Rust
    volumes:
      - ../emails:/app/emails      # mount emails output directory
    depends_on:
      tempo:
        condition: service_healthy
      searxng:
        condition: service_started