# deepforge-cronjobs.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: deepforge-daily-ai-news
  namespace: deepforge
spec:
  schedule: "0 7 * * *"  # Every day at 7 AM
  concurrencyPolicy: Forbid  # Don't run if previous job is still running
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  imagePullPolicy: Never
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: deepforge
            image: your-registry/deepforge:latest
            imagePullPolicy: Never
            args:
            - "--query"
            - "Latest AI news today including breakthroughs, research papers, and industry developments"
            envFrom:
            - configMapRef:
                name: deepforge-config
            - secretRef:
                name: deepforge-secrets
            # Resource limits
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: deepforge
  namespace: research
spec:
  schedule: "0 8 * * 0"  # Every Sunday at 8 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          restartPolicy: Never
          containers:
          - name: deepforge
            image: your-registry/deepforge:latest
            imagePullPolicy: Never
            args:
            - "--query"
            - |
              Weekly AI and tech digest covering:
              1. Major AI breakthroughs and research papers
              2. Tech industry news and acquisitions
              3. Emerging trends in software development
              4. Cloud computing and infrastructure updates
              5. Notable startup funding and launches
            envFrom:
            - configMapRef:
                name: deepforge-config
            - secretRef:
                name: deepforge-secrets
            resources:
              requests:
                memory: "384Mi"
                cpu: "200m"
              limits:
                memory: "768Mi"
                cpu: "1000m"