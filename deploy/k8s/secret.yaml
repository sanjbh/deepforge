apiVersion: v1
kind: Secret
metadata:
  name: deepforge-secrets
  namespace: deepforge
  labels:
    app: deepforge
    component: secrets
type: Opaque
stringData:
  # Gemini API Key (required)
  # Get your API key from: https://makersuite.google.com/app/apikey
  GEMINI_API_KEY: "<your-gemini-api-key-here>"
  
  # SendGrid API Key (optional - only needed if using SendGrid for email)
  # Leave empty to use MailHog or file-based email
  SENDGRID_API_KEY: ""
  
  # Note: In production, consider using:
  # 1. Kubernetes External Secrets
  # 2. HashiCorp Vault
  # 3. Cloud provider secret management (AWS Secrets Manager, GCP Secret Manager, Azure Key Vault)
  # 4. Sealed Secrets for GitOps workflows